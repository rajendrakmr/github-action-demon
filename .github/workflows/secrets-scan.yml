name: Secrets Scan

on: 
    workflow_call:

jobs:
    secrets-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0

            - name: Run Gitleak scaner
              uses: gitleaks/gitleaks-action@v2.3.9
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                

              